name: Refactor
description: ♻️ Code cleanup with no user-visible change
title: "[Refactor] "
labels: [ "enhancement" ]
type: task
body:
  - type: textarea
    id: what
    attributes:
      label: 🧹 What
      description: What code needs to be cleaned up, simplified, or restructured?
      placeholder: "e.g., Replace deprecated function X with Y"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 💡 Why
      description: Why is this refactoring needed?
      placeholder: "e.g., Reduce duplication, improve readability, prepare for new feature"
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 🎯 Done when
      description: What acceptance criteria has to be met, so that this issue can be resolved?
      placeholder: "e.g., Code is structured and useless comments are deleted"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 📝 Notes (optional)
      description: Any implementation ideas, links or references
      placeholder: "e.g., Link to related PR, design doc, etc."