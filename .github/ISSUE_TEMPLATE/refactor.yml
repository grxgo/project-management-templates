name: Refactor
description: ♻️ Code cleanup with no user-visible change
title: "[Refactor] "
labels: ["refactor"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🧹 What
        <!-- What code needs to be cleaned up, simplified, or restructured? -->

  - type: textarea
    id: what
    attributes:
      label: 🧹 What
      description: What code needs to be cleaned up, simplified, or restructured?
      placeholder: "e.g., Replace deprecated function X with Y"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 💡 Why
      description: Why is this refactoring needed? (e.g., reduce duplication, improve readability, prepare for new feature)
      placeholder: "e.g., Reduce duplication, improve readability, prepare for new feature"
    validations:
      required: true

  - type: checkboxes
    id: done
    attributes:
      label: 🎯 Done when
      options:
        - label: "Task 1"
        - label: "Task 2"
        - label: "Task 3"

  - type: textarea
    id: notes
    attributes:
      label: 📝 Notes (optional)
      description: Any implementation ideas, links or references
      placeholder: "e.g., Link to related PR, design doc, etc."