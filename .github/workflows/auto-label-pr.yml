name: Auto Label Pull Requests

on:
  pull_request:
    types: opened

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Apply labels to issues and PRs
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: |            
            - name: bug
              if: |
                github.event.pull_request.title.contains('[Bug]')
            - name: feature
              if: |
                github.event.pull_request.title.contains('[Feature]')
            - name: enhancement
              if: |
                github.event.pull_request.title.contains('[Enhancement]')
            - name: refactor
              if: |
                github.event.pull_request.title.contains('[Refactor]')
            - name: documentation
              if: |
                github.event.pull_request.title.contains('[Documentation]')