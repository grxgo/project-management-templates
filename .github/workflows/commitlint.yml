# This repo follows its own rule: same check as in the other grxgo repos.
# Local path instead of grxgo/.github/...@main on purpose — it runs the
# version from the PR branch, so changes to the reusable workflow are tested
# by the very PR that makes them (and the first-ever PR could not fail on a
# not-yet-existing @main reference again).
name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  commitlint:
    uses: ./.github/workflows/conventional-commits.yml
